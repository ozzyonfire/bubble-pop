<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#53a3ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Bubble Pop</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">Bubble Pop</div>
      <div class="stats">
        <span id="score">0</span> pops
      </div>
      <button id="resetBtn" class="btn" type="button" aria-label="Reset">Reset</button>
    </header>

    <main class="stage">
      <canvas id="game" aria-label="Bubble Pop game canvas"></canvas>
      <div class="hint" id="hint">Tap / click to pop!</div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
